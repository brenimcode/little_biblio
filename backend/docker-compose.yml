version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: little_biblio_postgres
    restart: always
    environment:
      POSTGRES_USER: littlebiblio
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: littlebiblio_db
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
